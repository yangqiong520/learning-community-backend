      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SuccessResponse'
                - properties:
                    data:
                      items:
                        $ref: '#/components/schemas/Year'
                      type: array
                  type: object
          description: 获取成功
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: 权限不足
      security:
      - bearerAuth: []
      summary: 获取年份列表
      tags:
      - 年份管理
    post:
      description: 创建年份（仅教师和管理员）
      requestBody:
        content:
          application/json:
            schema:
              properties:
                name:
                  description: 年份名称（如：2024学年度）
                  example: 2024学年度
                  type: string
                year:
                  description: 年份（整数）
                  example: 2024
                  format: int32
                  type: integer
              required:
              - year
              - name
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/Schema'
                - properties:
                    data:
                      $ref: '#/components/schemas/Year'
                  type: object
                type: object
          description: 创建成功
