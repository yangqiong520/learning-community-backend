        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: 权限不足
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: 年份已存在
      security:
      - bearerAuth: []
      summary: 创建年份
      tags:
      - 年份管理
